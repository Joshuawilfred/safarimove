<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - SafariMove</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="padding: 30px; background-color: var(--color-bg-light);">
    <a href="dashboard.html" class="btn btn-outline" style="margin-bottom: 20px;"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
    <h2>Financial Transactions</h2>
    <div class="glass-panel" style="padding: 20px; margin-top: 20px;">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="border-bottom: 2px solid var(--color-border-light);">
                    <th style="padding: 10px;">Date</th>
                    <th style="padding: 10px;">Type</th>
                    <th style="padding: 10px;">Reference</th>
                    <th style="padding: 10px;">Amount</th>
                </tr>
            </thead>
            <tbody>
                <tr style="border-bottom: 1px solid var(--color-border-light);">
                    <td style="padding: 10px;">May 21, 2026</td>
                    <td style="padding: 10px;">Top-up (M-Pesa)</td>
                    <td style="padding: 10px;">MPESA_12345</td>
                    <td style="padding: 10px; color: var(--color-success);">+ TZS 1000</td>
                </tr>
                <tr style="border-bottom: 1px solid var(--color-border-light);">
                    <td style="padding: 10px;">May 21, 2026</td>
                    <td style="padding: 10px;">Ride Payment</td>
                    <td style="padding: 10px;">TRIP_789</td>
                    <td style="padding: 10px; color: #ef4444;">- TZS 450</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
