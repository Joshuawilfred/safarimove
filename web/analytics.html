<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - SafariMove</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="padding: 30px; background-color: var(--color-bg-light);">
    <a href="dashboard.html" class="btn btn-outline" style="margin-bottom: 20px;"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
    <h2>Analytics Overview</h2>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
        <div class="glass-panel" style="padding: 20px;">
            <h3>Revenue (Last 6 Months)</h3>
            <div style="height: 300px;"><canvas id="revenueChart"></canvas></div>
        </div>
        <div class="glass-panel" style="padding: 20px;">
            <h3>Trip Distribution</h3>
            <div style="height: 300px;"><canvas id="tripDistributionChart"></canvas></div>
        </div>
    </div>
    <script src="js/charts.js"></script>
</body>
</html>
