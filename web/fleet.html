<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet - SafariMove</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="padding: 30px; background-color: var(--color-bg-light);">
    <a href="dashboard.html" class="btn btn-outline" style="margin-bottom: 20px;"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
    <h2>Fleet Management</h2>
    <div class="glass-panel" style="padding: 20px; margin-top: 20px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="stat-card">
                <h4>KCA 123G (Toyota Probox)</h4>
                <p style="color: var(--color-success);"><i class="fa-solid fa-circle"></i> Active - CBD</p>
                <div style="margin-top: 10px; font-size: 0.9rem; color: var(--color-text-muted);">Assigned Driver: David K.</div>
            </div>
            <div class="stat-card">
                <h4>KCD 456X (Delivery Bike)</h4>
                <p style="color: var(--color-success);"><i class="fa-solid fa-circle"></i> Active - Kilimani</p>
                <div style="margin-top: 10px; font-size: 0.9rem; color: var(--color-text-muted);">Assigned Driver: Sarah W.</div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => { Auth.requireAuth(); });
    </script>
</body>
</html>
